<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Satyam Shukla</title>
    <meta name="description" content="Get in touch with Satyam Shukla, Software Engineer.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <header class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-bracket">&lt;</span>Satyam<span class="logo-dot">.</span>dev<span class="logo-bracket">/&gt;</span>
            </a>
            <nav class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="projects.html" class="nav-link">Projects</a>
                <a href="resume.html" class="nav-link">Resume</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <section class="page-hero">
        <span class="section-tag">Let's Connect</span>
        <h1>Contact Me</h1>
        <p>Have a project in mind? Let's talk!</p>
        <div class="section-divider" style="margin: 1rem auto 0;"></div>
    </section>

    <div class="contact-grid">
        <div class="contact-info">
            <div class="contact-info-card">
                <div class="icon"><i class="fas fa-envelope"></i></div>
                <div>
                    <h4>Email</h4>
                    <p>satyamkumarshukla24@gmail.com</p>
                </div>
            </div>
            <div class="contact-info-card">
                <div class="icon"><i class="fas fa-phone"></i></div>
                <div>
                    <h4>Phone</h4>
                    <p>+91 8957049057</p>
                </div>
            </div>
            <div class="contact-info-card">
                <div class="icon"><i class="fas fa-map-marker-alt"></i></div>
                <div>
                    <h4>Location</h4>
                    <p>India</p>
                </div>
            </div>
            <div class="contact-info-card">
                <div class="icon"><i class="fab fa-whatsapp"></i></div>
                <div>
                    <h4>WhatsApp</h4>
                    <p><a href="https://wa.me/919876543210" style="color: var(--accent-2);">Chat on WhatsApp</a></p>
                </div>
            </div>
        </div>

        <form class="contact-form" id="contact-form">
            <div class="form-group">
                <input type="text" placeholder="Your Name" required id="contact-name">
            </div>
            <div class="form-group">
                <input type="email" placeholder="Your Email" required id="contact-email">
            </div>
            <div class="form-group">
                <input type="text" placeholder="Subject" id="contact-subject">
            </div>
            <div class="form-group">
                <textarea placeholder="Your Message" required id="contact-message"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="contact-submit">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </form>
    </div>

    <footer class="footer" id="footer" style="margin-top: 4rem;">
        <div class="footer-container">
            <div class="footer-brand">
                <span class="logo-bracket">&lt;</span>Satyam<span class="logo-dot">.</span>dev<span class="logo-bracket">/&gt;</span>
            </div>
            <div class="footer-social">
                <a href="https://github.com/" class="footer-social-link" aria-label="GitHub" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/" class="footer-social-link" aria-label="LinkedIn" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://twitter.com/" class="footer-social-link" aria-label="Twitter" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://instagram.com/" class="footer-social-link" aria-label="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
            <div class="footer-copy"><p>All rights reserved &copy; 2026 Satyam Shukla.</p></div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
